# =============================================================================
# .github/workflows/docker-publish.yml — Build and publish Docker image
#
# Triggers:
#   - push to main → builds and pushes :latest tag
#   - push of v* tag → builds and pushes :<version> tag + GitHub Release assets
#
# Registry: ghcr.io/jmagar/synapse2
# =============================================================================

name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE_NAME: ghcr.io/jmagar/synapse2

jobs:
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Determine the Docker tags to push:
      #   main branch  → :latest
      #   v1.2.3 tag   → :1.2.3 AND :latest
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Single-platform amd64 build and push.
      # arm64 was dropped: emulated QEMU arm64 Rust builds exceeded the job
      # timeout. Re-add via a native arm64 runner matrix if arm64 is needed.
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          # TEMPLATE: Dockerfile lives at config/Dockerfile.
          file: config/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Trivy vulnerability scan ─────────────────────────────────────────────────
  trivy:
    name: Trivy Vulnerability Scan
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Trivy
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a0b350d16c55eb73629 # 0.31.0
        with:
          image-ref: ghcr.io/jmagar/synapse2:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
