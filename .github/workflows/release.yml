# =============================================================================
# .github/workflows/release.yml — Build release binaries and GitHub Release
#
# TEMPLATE substitutions required:
#   BINARY_NAME  → your binary name from Cargo.toml [[bin]] (e.g. "myservice")
#   REPO_NAME    → your GitHub repo name (e.g. "myservice-mcp")
#
# Replace every occurrence of "example" in this file with your binary name.
#
# Triggers: push of v* tags (e.g. v1.2.3)
#
# What this does:
#   1. Builds release binaries for linux/amd64 and windows/amd64
#   2. Copies binaries to bin/ and commits via Git LFS
#   3. Creates a GitHub Release with binaries as downloadable assets
#   4. The commit in step 2 updates the LFS pointer so plugin install.sh
#      can `git lfs pull` the binary without building from source
#
# TEMPLATE: After creating your first real release, update install.sh to
#           reference the correct GitHub release download URL pattern.
# =============================================================================

name: Release

on:
  push:
    tags: ["v*"]

env:
  BINARY_NAME: synapse

jobs:
  # ── Build release binaries ────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux/amd64 — most common deployment target
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x86_64
            ext: ""
          # windows/amd64 — cross-compiled via MinGW
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            arch: windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      # Cross-compilation toolchain for Windows on Linux runners.
      - name: Install cross-compilation tools (windows only)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      # TEMPLATE: If you need OpenSSL, add it here:
      #   sudo apt-get install -y libssl-dev
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # TEMPLATE: Change "rmcp-template" to your repo name.
          key: ${{ github.repository }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-release-${{ matrix.target }}-

      # Build the release binary.
      # TEMPLATE: Replace BINARY_NAME env references if you renamed the env var.
      - name: Install pnpm
        working-directory: apps/web
        run: npm install -g "$(node -p "require('./package.json').packageManager")"

      - name: Build web assets
        working-directory: apps/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build release binary
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: |
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare binary artifact
        run: |
          mkdir -p package artifacts
          # TEMPLATE: Replace "example" with your binary name.
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }} \
             package/${{ env.BINARY_NAME }}${{ matrix.ext }}
          chmod +x package/${{ env.BINARY_NAME }}${{ matrix.ext }}
          tar -C package -czf artifacts/${{ env.BINARY_NAME }}-${{ matrix.arch }}.tar.gz \
            ${{ env.BINARY_NAME }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.arch }}
          path: artifacts/

  # ── Commit binaries to bin/ via Git LFS ──────────────────────────────────────
  #
  # SECURITY: This job pushes to a dedicated `binaries` branch (not `main`)
  # to avoid bypassing branch protection on the default branch.
  # The push updates LFS pointers so `git lfs pull` works in the Claude plugin
  # install flow. An auto-PR is opened from `binaries` → `main` via `gh pr create`.
  #
  # Option: If you don't need the LFS pointer in-repo at all, delete this job
  # entirely and distribute binaries via Release assets only (the `release` job
  # below already does this). That is the simpler and safer path.
  lfs-commit:
    name: Commit binaries to bin/ (Git LFS)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true
          # Use a deploy key or token with write access to push the commit.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Copy binaries to bin/
        run: |
          set -euo pipefail
          mkdir -p bin
          BIN=${{ env.BINARY_NAME }}

          # Each artifact dir is named <binary>-<arch> and contains one tarball.
          # merge-multiple flattens all artifact contents into artifacts/ directly.
          tar -xz -C bin -f artifacts/${BIN}-x86_64.tar.gz
          mv bin/${BIN} bin/${BIN}-linux-amd64

          tar -xz -C bin -f artifacts/${BIN}-windows-x86_64.tar.gz
          mv bin/${BIN}.exe bin/${BIN}-windows-amd64.exe

          chmod +x bin/${BIN}-linux-amd64

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit LFS binaries to binaries branch
        run: |
          set -euo pipefail
          # Push to a dedicated `binaries` branch — never directly to `main`.
          # Branch protection on `main` is not bypassed; the PR below allows
          # normal review/auto-merge to land the pointer update.
          BRANCH="binaries/release-${{ github.ref_name }}"
          git checkout -b "${BRANCH}"
          git add bin/
          git diff --staged --quiet || \
            git commit -m "chore: release binaries ${{ github.ref_name }}"
          git push origin "${BRANCH}"

      - name: Open auto-merge PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="binaries/release-${{ github.ref_name }}"
          # Open a PR; if one already exists for this branch the command exits non-zero
          # but we continue so the rest of the release job is not blocked.
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: update LFS binary pointers for ${{ github.ref_name }}" \
            --body "Automated PR: updates \`bin/\` LFS pointers for release \`${{ github.ref_name }}\`. Safe to auto-merge once CI passes." \
            --label "automated" \
            || echo "PR already exists or skipped"

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build, lfs-commit]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          # TEMPLATE: Update release notes format if you have a CHANGELOG.
          generate_release_notes: true
          files: artifacts/*
