# =============================================================================
# docker-compose.prod.yml — Production deployment template
#
# Synapse2 production compose template.
#
# Authentication is validated by the binary. For bearer deployments, set
# SYNAPSE_MCP_TOKEN in .env. For OAuth-only deployments, set
# SYNAPSE_MCP_AUTH_MODE=oauth plus the OAuth variables and leave
# SYNAPSE_MCP_TOKEN unset.
# =============================================================================

name: synapse2

x-common-service: &common-service
  networks:
    - mcp
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  synapse2:
    <<: *common-service
    image: synapse2:${SYNAPSE2_VERSION:-latest}
    container_name: synapse2
    env_file:
      - path: .env
        required: false
    environment:
      # SYNAPSE_MCP_HOST controls what address the binary binds inside the
      # container. 0.0.0.0 is correct here so the binary listens on all
      # container interfaces; the *host-side* exposure is controlled by the
      # port mapping below.
      SYNAPSE_MCP_HOST: 0.0.0.0
      SYNAPSE_MCP_PORT: "40080"
      SYNAPSE_MCP_TOKEN: "${SYNAPSE_MCP_TOKEN:-}"
    ports:
      # Default: bind to loopback only — not exposed on all interfaces.
      # Production deployments should sit behind a reverse proxy (SWAG/nginx/Caddy)
      # which terminates TLS and handles auth. Direct external exposure combined
      # with SYNAPSE_NOAUTH=true would grant root-equivalent Docker access.
      # To expose on all interfaces (e.g. when a reverse proxy handles auth
      # externally), override: SYNAPSE_MCP_BIND_HOST=0.0.0.0 in your .env and
      # change the mapping to: "${SYNAPSE_MCP_BIND_HOST:-127.0.0.1}:..."
      - "${SYNAPSE_MCP_BIND_HOST:-127.0.0.1}:${SYNAPSE_MCP_HOST_PORT:-40080}:40080/tcp"
    volumes:
      # Persistent appdata — config.toml, .env, auth.db, JWT key. The binary reads
      # config.toml / .env from here (it maps to /data inside the container).
      - ${HOME}/.synapse2:/data
      # Docker control plane for the `flux` tools.
      # SECURITY: bind-mounting the daemon socket grants this container
      # root-equivalent control of the host's Docker. Only enable on hosts you
      # intend Synapse to manage. Comment out to disable all `flux` Docker
      # operations (the `scout` SSH tools keep working).
      - /var/run/docker.sock:/var/run/docker.sock
      # Operator SSH config + keys. Hosts are auto-discovered into the fleet from
      # ~/.ssh/config (see src/host_config.rs); HOME=/home/synapse in the image,
      # so the config must land at /home/synapse/.ssh. Mounted read-only.
      - ${HOME}/.ssh:/home/synapse/.ssh:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    # The docker socket is owned by root:docker on the host. Add that group so the
    # UID-1000 service can reach the daemon. Set DOCKER_GID to your host's docker
    # group id:  getent group docker | cut -d: -f3
    group_add:
      - "${DOCKER_GID:?set DOCKER_GID from: getent group docker | cut -d: -f3}"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:40080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  synapse2-data:

networks:
  mcp:
    name: ${DOCKER_NETWORK:-mcp}
    external: true
